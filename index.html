<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A premium interactive stopwatch web application by ProDigy InfoTech – Task 02. Start, pause, reset, and record lap times with a stunning UI." />
  <title>Stopwatch | ProDigy InfoTech – Task 02</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #070b18;
      --bg-card:    #0d1428;
      --accent1:    #7c3aed;
      --accent2:    #06b6d4;
      --accent3:    #f59e0b;
      --text-main:  #e2e8f0;
      --text-muted: #64748b;
      --glass:      rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);
    }

    /* ── Base ─────────────────────────────────────────── */
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── Ambient background blobs ─────────────────────── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--accent1); top: -200px; left: -200px; }
    .blob-2 { width: 500px; height: 500px; background: var(--accent2); bottom: -150px; right: -150px; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent3); top: 40%; left: 50%; transform: translate(-50%,-50%); }

    /* ── Header ───────────────────────────────────────── */
    header {
      position: relative; z-index: 10;
      width: 100%;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(7,11,24,0.7);
      backdrop-filter: blur(20px);
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
    }
    .brand-logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand-name { font-size: 1rem; font-weight: 600; }
    .brand-name span { color: var(--accent2); }
    .task-badge {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      padding: 6px 16px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
    }

    /* ── Main content ─────────────────────────────────── */
    main {
      position: relative; z-index: 10;
      width: 100%; max-width: 860px;
      padding: 48px 24px 60px;
      display: flex; flex-direction: column; align-items: center; gap: 40px;
    }

    /* ── Page title ───────────────────────────────────── */
    .page-title { text-align: center; }
    .page-title h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .page-title p {
      margin-top: 8px;
      color: var(--text-muted); font-size: 0.9rem; letter-spacing: 0.5px;
    }

    /* ── Clock card ───────────────────────────────────── */
    .clock-card {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 32px;
      backdrop-filter: blur(24px);
      padding: 48px 32px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 40px;
    }

    /* ── Gradient Half-Circle ─────────────────────────── */
    .arc-wrapper {
      position: relative;
      width: 320px; height: 160px;          /* half the circle height */
      overflow: hidden;
    }
    .arc-bg-ring {
      position: absolute; inset: 0;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        var(--accent1) 0deg,
        var(--accent2) 90deg,
        var(--accent3) 130deg,
        transparent 130deg
      );
      top: 0; left: 0;
    }
    /* inner cutout */
    .arc-inner {
      position: absolute;
      width: 260px; height: 260px;
      top: 30px; left: 30px;
      border-radius: 50%;
      background: var(--bg-card);
    }
    /* progress arc (SVG based, controlled by JS) */
    .arc-svg {
      position: absolute;
      top: 0; left: 0;
      width: 320px; height: 320px;
    }
    /* center display */
    .arc-display {
      position: absolute;
      top: 30px; left: 30px;
      width: 260px; height: 130px;   /* only top half visible */
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .time-display {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
    }
    .time-display .ms {
      font-size: 0.55em;
      color: var(--accent2);
    }
    .status-label {
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color 0.3s;
    }
    .status-label.running { color: var(--accent2); }
    .status-label.paused  { color: var(--accent3); }

    /* number 02 watermark */
    .arc-number {
      position: absolute;
      bottom: 0; right: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 4rem; font-weight: 900;
      color: var(--accent1); opacity: 0.15;
      line-height: 1;
    }

    /* ── Controls ─────────────────────────────────────── */
    .controls {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; border-radius: 50px;
      font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.5px; cursor: pointer;
      border: none; outline: none;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0; transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:active { transform: scale(0.96); }

    .btn-start {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #fff;
      box-shadow: 0 0 24px rgba(124,58,237,0.4);
    }
    .btn-start:hover { box-shadow: 0 0 36px rgba(124,58,237,0.6); transform: translateY(-2px); }

    .btn-lap {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text-main);
    }
    .btn-lap:hover { border-color: var(--accent2); color: var(--accent2); transform: translateY(-2px); }
    .btn-lap:disabled { opacity: 0.35; pointer-events: none; }

    .btn-reset {
      background: var(--glass);
      border: 1px solid var(--border);
      color: #f87171;
    }
    .btn-reset:hover { border-color: #f87171; box-shadow: 0 0 20px rgba(248,113,113,0.25); transform: translateY(-2px); }

    /* btn icon */
    .btn-icon { font-size: 1.1em; }

    /* ── Lap list ─────────────────────────────────────── */
    .laps-section { width: 100%; }
    .laps-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .laps-header h2 {
      font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700;
      letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase;
    }
    .laps-count {
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    }

    .laps-list {
      list-style: none;
      display: flex; flex-direction: column; gap: 8px;
      max-height: 300px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--accent1) transparent;
    }
    .laps-list::-webkit-scrollbar { width: 4px; }
    .laps-list::-webkit-scrollbar-track { background: transparent; }
    .laps-list::-webkit-scrollbar-thumb { background: var(--accent1); border-radius: 2px; }

    .lap-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 14px;
      animation: slide-in 0.3s cubic-bezier(.22,.68,0,1.2) both;
      transition: border-color 0.2s;
    }
    .lap-item:hover { border-color: rgba(124,58,237,0.4); }
    .lap-item.fastest { border-color: var(--accent2); background: rgba(6,182,212,0.06); }
    .lap-item.slowest { border-color: #f87171; background: rgba(248,113,113,0.04); }

    .lap-num {
      font-family: 'Orbitron', sans-serif; font-size: 0.75rem;
      color: var(--text-muted); font-weight: 600; letter-spacing: 1px;
      min-width: 60px;
    }
    .lap-time {
      font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
      color: #fff; letter-spacing: 1px;
    }
    .lap-split {
      font-size: 0.78rem; color: var(--text-muted);
      min-width: 80px; text-align: right;
    }
    .lap-badge {
      font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .badge-fastest { background: rgba(6,182,212,0.2); color: var(--accent2); }
    .badge-slowest  { background: rgba(248,113,113,0.2); color: #f87171; }

    .laps-empty {
      text-align: center; padding: 32px;
      color: var(--text-muted); font-size: 0.85rem;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      position: relative; z-index: 10;
      margin-top: auto;
      width: 100%; border-top: 1px solid var(--border);
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 0.78rem; color: var(--text-muted);
    }
    footer span { color: var(--accent2); font-weight: 600; }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 520px) {
      .arc-wrapper { width: 260px; height: 130px; }
      .arc-bg-ring { width: 260px; height: 260px; }
      .arc-inner   { width: 210px; height: 210px; top: 25px; left: 25px; }
      .arc-svg     { width: 260px; height: 260px; }
      .arc-display { width: 210px; height: 105px; top: 25px; left: 25px; }
      .controls { gap: 10px; }
      .btn { padding: 12px 22px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <!-- ambient blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-logo">⏱</div>
      <div class="brand-name">ProDigy <span>InfoTech</span></div>
    </div>
    <div class="task-badge">TASK · 02</div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="page-title">
      <h1>Stopwatch</h1>
      <p>Measure, track, and record every moment with precision</p>
    </div>

    <!-- CLOCK CARD -->
    <div class="clock-card">

      <!-- ARC HALF-CIRCLE -->
      <div class="arc-wrapper" aria-hidden="true">
        <!-- static gradient background ring -->
        <div class="arc-bg-ring"></div>
        <!-- inner cutout -->
        <div class="arc-inner"></div>
        <!-- animated SVG progress arc -->
        <svg class="arc-svg" viewBox="0 0 320 320" fill="none">
          <!-- track -->
          <circle cx="160" cy="160" r="130"
            stroke="rgba(255,255,255,0.06)" stroke-width="12"
            stroke-dasharray="408.40 408.40"
            stroke-dashoffset="204.20"
            stroke-linecap="round"
            transform="rotate(180 160 160)" />
          <!-- progress -->
          <circle id="arcProgress" cx="160" cy="160" r="130"
            stroke="url(#arcGrad)" stroke-width="12"
            stroke-dasharray="408.40 408.40"
            stroke-dashoffset="408.40"
            stroke-linecap="round"
            transform="rotate(180 160 160)" />
          <defs>
            <linearGradient id="arcGrad" x1="0" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#7c3aed" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
        </svg>
        <!-- center display -->
        <div class="arc-display">
          <div class="time-display" id="display" aria-live="polite" aria-label="Elapsed time">
            00:00<span class="ms">.00</span>
          </div>
          <div class="status-label" id="statusLabel">READY</div>
        </div>
        <div class="arc-number">02</div>
      </div>

      <!-- CONTROLS -->
      <div class="controls" role="group" aria-label="Stopwatch controls">
        <button class="btn btn-start" id="btnStartPause" onclick="toggleStartPause()" aria-label="Start stopwatch">
          <span class="btn-icon">▶</span> Start
        </button>
        <button class="btn btn-lap" id="btnLap" onclick="recordLap()" disabled aria-label="Record lap">
          <span class="btn-icon">⚑</span> Lap
        </button>
        <button class="btn btn-reset" id="btnReset" onclick="resetStopwatch()" aria-label="Reset stopwatch">
          <span class="btn-icon">↺</span> Reset
        </button>
      </div>

      <!-- LAP SECTION -->
      <div class="laps-section">
        <div class="laps-header">
          <h2>Lap Times</h2>
          <span class="laps-count" id="lapsCount">0 laps</span>
        </div>
        <ul class="laps-list" id="lapList" aria-label="Recorded lap times">
          <li class="laps-empty" id="emptyMsg">No laps recorded yet. Start the stopwatch and hit Lap!</li>
        </ul>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span>ProDigy InfoTech</span> · Stopwatch Web Application · Task-02
  </footer>

  <script>
    /* ── State ──────────────────────────────────────── */
    let startTime   = 0;
    let elapsedTime = 0;
    let timerID     = null;
    let isRunning   = false;
    let laps        = [];
    let lastLapTime = 0;

    /* ── Arc constants (half-circle = 204.20 dash) ── */
    const HALF_CIRCUMFERENCE = Math.PI * 130; // ~408.407 → half = 204.20
    const arcEl = document.getElementById('arcProgress');

    /* ── DOM refs ───────────────────────────────────── */
    const display    = document.getElementById('display');
    const statusLbl  = document.getElementById('statusLabel');
    const btnSP      = document.getElementById('btnStartPause');
    const btnLap     = document.getElementById('btnLap');
    const lapList    = document.getElementById('lapList');
    const lapsCount  = document.getElementById('lapsCount');
    const emptyMsg   = document.getElementById('emptyMsg');

    /* ── Helpers ──────────────────────────────────── */
    function formatTime(ms) {
      const minutes = Math.floor(ms / 60000);
      const seconds = Math.floor((ms % 60000) / 1000);
      const centis  = Math.floor((ms % 1000) / 10);
      const mm = String(minutes).padStart(2,'0');
      const ss = String(seconds).padStart(2,'0');
      const cc = String(centis).padStart(2,'0');
      return { mm, ss, cc };
    }

    function updateDisplay(ms) {
      const { mm, ss, cc } = formatTime(ms);
      display.innerHTML = `${mm}:${ss}<span class="ms">.${cc}</span>`;

      // update arc (animate over 60 s cycle)
      const cycle = 60000;
      const fraction = (ms % cycle) / cycle;
      const offset   = HALF_CIRCUMFERENCE - fraction * HALF_CIRCUMFERENCE;
      arcEl.style.strokeDashoffset = offset.toFixed(2);
    }

    function tick() {
      elapsedTime = Date.now() - startTime;
      updateDisplay(elapsedTime);
    }

    /* ── Controls ─────────────────────────────────── */
    function toggleStartPause() {
      if (!isRunning) {
        // START
        startTime = Date.now() - elapsedTime;
        timerID   = setInterval(tick, 30);
        isRunning = true;
        btnSP.innerHTML = '<span class="btn-icon">⏸</span> Pause';
        btnSP.setAttribute('aria-label', 'Pause stopwatch');
        btnLap.disabled = false;
        statusLbl.textContent = 'RUNNING';
        statusLbl.className = 'status-label running';
      } else {
        // PAUSE
        clearInterval(timerID);
        isRunning = false;
        btnSP.innerHTML = '<span class="btn-icon">▶</span> Resume';
        btnSP.setAttribute('aria-label', 'Resume stopwatch');
        btnLap.disabled = true;
        statusLbl.textContent = 'PAUSED';
        statusLbl.className = 'status-label paused';
      }
    }

    function recordLap() {
      if (!isRunning) return;
      const lapTime  = elapsedTime - lastLapTime;
      lastLapTime    = elapsedTime;
      laps.push({ total: elapsedTime, split: lapTime });
      renderLaps();
    }

    function resetStopwatch() {
      clearInterval(timerID);
      isRunning   = false;
      elapsedTime = 0;
      lastLapTime = 0;
      laps        = [];
      updateDisplay(0);
      arcEl.style.strokeDashoffset = HALF_CIRCUMFERENCE.toFixed(2);
      btnSP.innerHTML = '<span class="btn-icon">▶</span> Start';
      btnSP.setAttribute('aria-label', 'Start stopwatch');
      btnLap.disabled = true;
      statusLbl.textContent = 'READY';
      statusLbl.className = 'status-label';
      renderLaps();
    }

    /* ── Lap rendering ────────────────────────────── */
    function renderLaps() {
      lapsCount.textContent = laps.length === 1 ? '1 lap' : `${laps.length} laps`;

      if (laps.length === 0) {
        lapList.innerHTML = '';
        lapList.appendChild(createEmptyMsg());
        return;
      }

      // find fastest / slowest split
      const splits  = laps.map(l => l.split);
      const minSplit = Math.min(...splits);
      const maxSplit = Math.max(...splits);

      lapList.innerHTML = '';
      // reverse so newest is on top
      [...laps].reverse().forEach((lap, revIdx) => {
        const realIdx = laps.length - revIdx;   // 1-based
        const isFast  = laps.length > 1 && lap.split === minSplit;
        const isSlow  = laps.length > 1 && lap.split === maxSplit;

        const { mm: tm, ss: ts, cc: tc } = formatTime(lap.total);
        const { mm: sm, ss: ss2, cc: sc } = formatTime(lap.split);

        const li = document.createElement('li');
        li.className = 'lap-item' + (isFast ? ' fastest' : isSlow ? ' slowest' : '');

        let badgeHTML = '';
        if (isFast) badgeHTML = '<span class="lap-badge badge-fastest">Fastest</span>';
        if (isSlow) badgeHTML = '<span class="lap-badge badge-slowest">Slowest</span>';

        li.innerHTML = `
          <span class="lap-num">LAP ${String(realIdx).padStart(2,'0')}</span>
          <span class="lap-time">${tm}:${ts}.${tc}</span>
          <span class="lap-split">+${sm}:${ss2}.${sc}</span>
          ${badgeHTML}
        `;
        lapList.appendChild(li);
      });
    }

    function createEmptyMsg() {
      const li = document.createElement('li');
      li.className = 'laps-empty';
      li.textContent = 'No laps recorded yet. Start the stopwatch and hit Lap!';
      return li;
    }

    /* ── Keyboard shortcuts ───────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); toggleStartPause(); }
      if (e.code === 'KeyL')  { if (isRunning) recordLap(); }
      if (e.code === 'KeyR')  { resetStopwatch(); }
    });
  </script>
</body>
</html>
